version: "3.8"

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock   # 호스트의 도커 소켓 공유 (DooD)
    group_add:
      - "999"   # 호스트의 docker 그룹 GID. 'getent group docker'로 확인해서 맞춰주세요

volumes:
  jenkins_home: